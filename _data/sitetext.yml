  timeline:
    title: "2026 Invited Speakers"
    text: "Thank you to our invited speakers for sharing their exciting research!"
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "Featured Corteva Speaker"
        year: "Andrea Varella"
        desc: "Dr. Andrea C. Varella is a Corn Breeding Scientist at Corteva Agriscience. She began her plant breeding career at Montana State University, earning a Ph.D. in Plant Breeding and Genetics and serving as a Postdoctoral Researcher. She later joined Limagrain as a wheat breeder in Western Canada, where she developed and implemented breeding strategies, technologies, and advanced germplasm to deliver improved varieties to growers. In 2022, she transitioned to a management role, leading Limagrain’s Cereals and Pulses Research teams across North America. In 2024, Andrea relocated to Eastern Canada to join Corteva Agriscience, where she now collaborates with a dynamic team of scientists to accelerate genetic gain in early maturity corn. In addition to her core breeding responsibilities, Andrea leads multiple initiatives to develop and implement advanced data collection strategies for disease resistance breeding."
        image: assets/img/timeline/avarella.jpg
      - title: "University of Wisconsin-Madison"
        year: "Julie Dawson"
        desc: "Dr. Julie Dawson is a Professor in the Department of Plant and Agroecosystem Sciences at the University of Wisconsin-Madison, training students in plant breeding and plant genetics, horticulture, and agroecology graduate fields. Research interests include the use of genetic resources in plant breeding for organic systems and methods for participatory selection and variety development. She is also the state extension specialist for regional food systems and does applied research for growers serving local food markets."
        image: assets/img/timeline/j_dawson.jpg
      - title: "University of Arizona"
        year: "Michael Kotutwa Johnson"
        desc: "Dr. Michael Kotutwa Johnson is an Assistant Professor/Extension Specialist of Indigenous Resilience at the University of Arizona’s School of Natural Resources and the Environment and a core faculty member of the Indigenous Resilience Center. Dr. Johnson is a Hopi tribal member and avid Hopi dryland farmer. He often mentions he is a 250th-generation Hopi farmer. His research focuses on Indigenous Land Use Management schemes, such as Indigenous agriculture and the intersections of policy, science, and law. His academic work consists of peer-reviewed journal articles and tribal outreach. He recently started the Fred Aptvi Foundation, focusing on growing traditional Hopi crops, establishing a community seed bank, and developing a Hopi youth agriculture program that includes the Hopi language."
        image: assets/img/timeline/mkotutwajohnson.jpg
      - title: "Cornell University"
        year: "Ying Sun"
        desc: "Dr. Ying Sun is an associate professor in the School of Integrative Plant Science at Cornell University and a Faculty Fellow of Cornell Atkinson Center for Sustainability. Ying’s research program studies the role of terrestrial ecosystems in regulating climate-biosphere-hydrosphere interactions and applies mechanistic insights gained to generate societal benefits. Her research covers both natural and agricultural systems. Ying received her BS in GIS and remote sensing from Beijing Normal University in China in 2008 and PhD in climate science from the University of Texas Austin in 2013. She joined JPL/Caltech as a distinguished postdoc fellow before moving to Cornell. Ying is a recipient of the Early Career Fellow of the Ecological Society of America (ESA) and NASA Group Achievement Award of the OCO-2 Science Team."
        image: assets/img/timeline/ysun.jpg 
      - title: "Stanford University"
        year: "José Dinneny"
        desc: "Dr. José Dinneny earned his BS in Plant Biology and Genetics from UC Berkeley. He pursued his Ph.D. at UC San Diego, under Detlef Weigel at the Salk Institute for Biological Studies and Martin Yanofsky in the Division of Biology, focusing on molecular genetic processes governing plant organ shape. As a post-doc, he joined the lab of Philip Benfey at Duke University, pioneering the use of Fluorescence Activated Cell Sorting (FACS) to create the first tissue-specific map of transcriptional changes during abiotic stress. José established his independent lab at the Temasek Lifesciences Laboratory (TLL) in Singapore, concurrently affiliated with the National University of Singapore's Department of Biological Sciences. In 2011, he moved his lab to the Carnegie Institution for Science, Department of Plant Biology, and in 2018, he joined Stanford University as a Professor in the Biology Department. In 2024, he became an Investigator of the Howard Hughes Medical Institute."
        image: assets/img/timeline/jdinneny.jpg
      - title: "University of California, Riverside"
        year: "Michael Allen"
        desc: "Dr. Michael Allen is a distinguished professor emeritus at the University of California, Riverside. His research concentrates on understanding the effects of human activities on ecosystem biodiversity and functioning. Dr. Allen’s research has focused on three general areas: first, impacts of human activities on wildlands, especially perturbations on soil organisms and resources. Second, documenting how natural succession proceeds to inform ecosystem restoration. This has entailed research on Mount St. Helens, Alaskan Glaciers, mines, roadways, and tropical forests. Finally, bringing ecological science into the decision-making process. This has included work with the County of Riverside and southern CA regional agencies and efforts to incorporate ecosystem-management approaches into federal decision-making. Dr. Allen joined the faculty at UCR in 1998 and was recognized with the Distinguished Service Award in 2015. Prior, he served on the faculty of San Diego State U, Utah State U, and U of Nebraska. He has written, co-written and edited several books, including The Ecology of Mycorrhizae (1991), a foundational text in the field."
        image: assets/img/timeline/mallen.png
      - title: "University of California, Davis - Botanical Conservatory"
        year: "Marlene Simon"
        desc: "Marlene started gardening at the age of six when she would have her parents order bulbs off the backside of Parade Magazine. She continued her gardening experience with internships at Sunset magazine in their test garden and as a gardener at the Winchester Mystery House while a student. She is currently living her dream as the curator of the UC Davis Botanical Conservatory. It’s here where Marlene grows and cares for over 4,000 specimens of the world’s most exotic, strangest and rarest plants and flowers. In addition to years of practical experience, Marlene earned her degree in Horticulture at UC Davis. Her classroom is now her backyard sitting on 40 acres where she grows all sorts of plants. When not at the Conservatory she can be found bi-monthly on Good Day Sacramento where she is known as “The Plant Lady”. She is a former garden writer for the Sacramento Bee and has a podcast called Flower Power Garden Hour where she talks with guests on all things plants and gardening. She also lectures frequently on all aspects on gardening. In her spare time, her and her husband have a non-profit cat sanctuary -- Lost Paws Feline Farm."
        image: assets/img/timeline/msimon.jpg 
      - title: "University of California, Davis - Tomato Genetics Resource Center"
        year: "Vincent Colantonio"
        desc: "Dr. Vincent Colantonio is an Assistant Professor of Plant Genetics and the Director of the C.M. Rick Tomato Genetics Resource Center at UC Davis. The TGRC is a national and international gene bank that preserves tomato biodiversity and genetic stocks to facilitate tomato research, breeding, and education around the world. Dr. Colantonio’s current research focuses on the development of genomic resources and computational tools for mining genetic variation in tomato wild relative populations maintained at the TGRC. He leverages these resources to study how agronomically important traits evolve in wild plant populations and how to efficiently introgress useful variation into modern commercial breeding materials. Prior to joining UC Davis, he received his PhD from the University of Florida focusing on Plant Breeding and Genomics and was a Research Molecular Biologist at the USDA-ARS Plant, Soil, and Nutrition Research Unit in Ithaca, NY. "
        image: assets/img/timeline/vcolantonio.jpg  
      - title: "University of California, Davis - Plant Transformation Facility"
        year: "Juan Debernardi"
        desc: "Dr. Juan Debernardi is a plant developmental and molecular biologist with a strong commitment to advancing crop improvement for sustainable agriculture. Juan earned his degree in Biotechnology and later a Ph.D. in Biological Sciences from the National University of Rosario (UNR), Argentina. In 2014, he joined Prof. Jorge Dubcovsky’s laboratory at UC Davis as a Human Frontier Science Program (HFSP) Postdoctoral Fellow, and later served as a Research Specialist supported by the Howard Hughes Medical Institute (HHMI). At UC Davis, Juan led a research team investigating the genetic networks that regulate wheat plant architecture and flowering time, and their impact on yield potential. During this time, he also co-developed the GRF–GIF technology, a widely adopted innovation that significantly enhances the recovery of gene-edited plants in wheat and other recalcitrant crops. Currently, Juan serves as Manager of the Plant Transformation Unit at UC Davis, where he coordinates plant transformation services and leads research initiatives aimed at improving gene-editing technologies and accelerating their application in crop improvement."
        image: assets/img/timeline/jdebernardi.jpg  
        # you can enforce the alignment
        #align: right
    end: "And more <br> from UC Davis <br> students and faculty!"

  about:
    title: "About"
    text: "Listen to insightful and exciting plant sciences research in Davis, CA."
    body_parts:
      - part: >
          We are thrilled to bring together the UC Davis Plant Sciences community for our **15th anniversary**! <br><br>
          Attend a day dedicated to scientific research in the plant sciences. Hear from speakers across a diverse range of plant-related disciplines, 
          network with academic and industry professionals alike, and enjoy a poster session featuring the research of up-and-coming scientists. 
          The speaking event will also be live-streamed to share the fantastic research with attendees near and far.<br><br>
          <b>In-Person Attendance Information</b>
          <br>The symposium will be hosted at the [UC Davis Alumni Center](https://maps.app.goo.gl/QxycyWT9rYQNVcP79) (530 Alumni Ln, Davis, CA 95616). 
          Lunch and light refreshments will be served on-site. Please be prepared to show proof of age when checking in if you would 
          like to consume an alcoholic beverage during the poster session.
          <br>
          <br>**Due to demand, we have re-opened in-person registration**. However, please note that by participating in late registration, you will not be guaranteed a lunch or dinner meal. For attendees that want to attend online, you may still sign up to attend virtually using the link below.
      - part: "<b>Virtual Attendance Information</b> <br> Individuals interested in attending virtually can use the button below to sign up for our **Zoom livestream**."
        button: "Join the webinar" 
        link: "https://ucdavis.zoom.us/webinar/register/WN_MKWq8hjWQiiCYRmKZh-C9g"  
      - part: "You may view our virtual poster session below. Thank you to our symposium presenters!"
        button: "View virtual posters"
        link: "https://ucdavis.box.com/s/1nh0f6lqj06s33x5rrkpc5nryq4manah"
      - part: >
          <b> Getting to the Alumni Center </b> <br>Nearby bus stops are located at the [Silo Terminal](https://maps.app.goo.gl/zvsw32iCE8tngSrW8) and [Peter J. Shields Library](https://maps.app.goo.gl/yeSy9FkKZduvnPip9), a 10-minute walk away.
          Bicycle parking is available near the Conference Center and across the street near the Mondavi Center. 
          Car parking is available with purchase of a [visitor pass](https://taps.ucdavis.edu/visitor) in the [Gateway Structure Parking Lot](https://maps.app.goo.gl/7mUGsTQ3YsF6VKrP6)
          and the open air lots behind the Manetti Shrem Museum. For information on accessible parking and services offered by UC Davis, check [here](https://transportation.ucdavis.edu/parking/guide/disabled#visitor). <br>
    section: about


      
 



